name: iosApp
options:
  bundleIdPrefix: com.koma.oneword
configs:
  Debug: debug
  Release: release
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "13.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koma.oneword.iosApp
        PRODUCT_NAME: OneWord
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: iosApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS: "$(inherited) -framework OneWordShared -lsqlite3"
    preBuildScripts:
      - name: Build shared framework
        script: |
          JAVA_17_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || true)
          if [ -z "$JAVA_17_HOME" ]; then
            echo "error: JDK 17 is required for Gradle/Kotlin builds. Install JDK 17 and retry." >&2
            exit 1
          fi
          if [ -z "$PLATFORM_NAME" ] || [ -z "$ARCHS" ]; then
            echo "error: Missing Xcode build environment. PLATFORM_NAME and ARCHS are required." >&2
            exit 1
          fi
          export JAVA_HOME="$JAVA_17_HOME"
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          ./gradlew \
            -Pcompose.ios.resources.platform="$PLATFORM_NAME" \
            -Pcompose.ios.resources.archs="$ARCHS" \
            :composeApp:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
