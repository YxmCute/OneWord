name: iosApp
options:
  bundleIdPrefix: com.koma.oneword
configs:
  Debug: debug
  Release: release
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "13.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koma.oneword.iosApp
        PRODUCT_NAME: OneWord
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: iosApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS: "$(inherited) -framework OneWordShared -lsqlite3"
    preBuildScripts:
      - name: Build shared framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
